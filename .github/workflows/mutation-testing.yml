name: Mutation Testing (Cosmic Ray)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  mutation-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest baseline
        run: python -m pytest tests -q

      - name: Cosmic Ray baseline
        run: cosmic-ray baseline cosmic-ray.toml

      - name: Initialize mutation session
        run: cosmic-ray init cosmic-ray.toml session.sqlite

      - name: Execute mutations
        run: cosmic-ray exec cosmic-ray.toml session.sqlite

      - name: Generate TESTABLE metrics report
        run: python scripts/metrics_reporter.py --session session.sqlite --fail-on-gate

      - name: Upload metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-metrics-report
          path: |
            reports/metrics-report.json
            reports/metrics-report.md
          retention-days: 30

      - name: Print summary
        if: always()
        run: |
          cr-rate session.sqlite
          echo "--- Surviving mutants ---"
          cr-report session.sqlite --surviving-only || true
